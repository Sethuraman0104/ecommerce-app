<!DOCTYPE html>
<html>

<head>
  <title id="pageTitle">Settings</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="layout">

  <!-- SIDEBAR (same as dashboard) -->
  <div class="sidebar">

    <div class="brand-card">
      <div class="brand-glow"></div>

      <div class="brand-content">
        <div class="brand-logo">
          <img id="companyLogo" src="../assets/logo.png">
        </div>

        <div class="brand-info">
          <h2 id="companyName">E-Shop</h2>
          <small>Admin Control Center</small>
        </div>
      </div>
    </div>

   <a href="/admin/dashboard.html"><i class="fa fa-home"></i> Dashboard</a>
<a href="/admin/products.html"><i class="fa fa-box"></i> Products</a>
<a href="/admin/orders.html"><i class="fa fa-file-invoice"></i> Orders</a>
<a href="/admin/customers.html"><i class="fa fa-users"></i> Customers</a>
<a href="/admin/payments.html"><i class="fa fa-credit-card"></i> Payments</a>
<a href="/admin/coupons.html"><i class="fa fa-tag"></i> Coupons</a>
<a href="/admin/reports.html"><i class="fa fa-chart-bar"></i> Reports</a>
<a href="/admin/settings.html" class="active"><i class="fa fa-cog"></i> Settings</a>
<a href="/admin/company.html"><i class="fa fa-building"></i> Company</a>

    <button onclick="App.logout()" class="logout-btn">
      <i class="fa fa-sign-out-alt"></i> Logout
    </button>

  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">

      <div class="page-title">
        <i class="fa fa-cog"></i>
        <h1>System Settings</h1>
      </div>

      <div class="top-right">

        <div class="user-card" onclick="App.goToProfile()">

          <img id="userPhoto" src="../assets/user.png" class="user-avatar">

          <div class="user-info">
            <div class="user-name" id="userName">Admin</div>
            <div class="user-role" id="userRole">Admin</div>
            <div class="user-login" id="lastLogin">Last login: -</div>
          </div>

        </div>

      </div>

    </div>

    <!-- CONTENT -->
    <div class="company-wrapper">

      <div class="company-card">

        <h2 class="section-title">
          <i class="fa fa-sliders"></i> System Settings
        </h2>

        <div class="form-grid">

  <!-- CURRENCY -->
  <div class="form-group">
    <label>Currency</label>
    <select id="currency"></select>
  </div>

  <!-- VAT -->
  <div class="form-group">
    <label>VAT (%)</label>
    <input id="vatPercent" type="number" placeholder="e.g. 5">
  </div>

  <!-- ADDITIONAL CHARGES -->
  <div class="form-group">
    <label>Additional Charges (%)</label>
    <input id="additionalCharges" type="number" placeholder="e.g. 2">
  </div>

  <!-- PAYMENT METHODS -->
  <div class="form-group full">
    <label>Allowed Payment Methods</label>

    <div class="checkbox-group">

      <label><input type="checkbox" value="Cash" class="payMethod"> Cash</label>
      <label><input type="checkbox" value="Card" class="payMethod"> Card</label>
      <label><input type="checkbox" value="Online" class="payMethod"> Online</label>
      <label><input type="checkbox" value="BankTransfer" class="payMethod"> Bank Transfer</label>

    </div>
  </div>

  <!-- DEVELOPED BY -->
  <div class="form-group">
    <label>Developed By</label>
    <input id="developedBy" type="text">
  </div>

  <!-- COPYRIGHT -->
  <div class="form-group full">
    <label>Copyright Company Name</label>
    <input id="copyrightName" type="text">
  </div>

</div>

        <div class="action-bar">
          <button class="btn primary" onclick="Settings.save()">
            <i class="fa fa-save"></i> Save Settings
          </button>
        </div>

      </div>

    </div>

    <!-- FOOTER -->
    <div class="footer" id="appFooter"></div>

  </div>

</div>

<script src="../config/config.js"></script>
<script src="../assets/js/common.js"></script>
<script src="../assets/js/settings.js"></script>

<script>
  App.init();
  Settings.init();
</script>

</body>
</html>
