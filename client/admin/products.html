  <div class="main">

    <div class="topbar">

      <div class="page-title">
        <i class="fa fa-box"></i>
        <h1>Products</h1>
      </div>

      <div class="top-right">

        <div class="user-card" onclick="App.goToProfile()">

          </div>

        </div>

      </div>

    </div>

    <!-- FILTER PANEL -->
    <div class="filter-panel">

      <div class="panel-title">
        <i class="fa fa-sliders"></i> Filters & Actions
      </div>

      <div class="panel-content">

        <div class="search-box">
          <i class="fa fa-search"></i>
          <input id="searchBox" placeholder="Search products..." onkeyup="applyFilters()">
        </div>

        <div class="filter-group">
          <select id="filterCategory" onchange="applyFilters()"></select>
        </div>

        <div class="action-right">
          <button class="btn add-btn" onclick="openProductModal()">
            <i class="fa fa-plus"></i> Add Product
          </button>

          <button class="btn category-btn" onclick="openCategoryModal()">
            <i class="fa fa-layer-group"></i> Categories
          </button>
        </div>

      </div>
    </div>

    <!-- PRODUCTS -->
    <div class="category-section" id="productGrid"></div>

    <!-- FOOTER -->
    <div class="footer" id="appFooter"></div>
  </div>
</div>

<div id="productModal" class="modal-overlay">

  <div class="modal-box product-modal">
    <div class="modal-glow"></div>

    <!-- HEADER (FIXED) -->
    <div class="modal-header">
      <h3>🛒 Product Details</h3>
      <button class="close-btn" onclick="closeModal()">✖</button>
    </div>

    <!-- SCROLLABLE CONTENT -->
    <div class="modal-body">

      <div class="form-grid">

        <div class="modal-input">
          <input id="name" placeholder="Product Name">
        </div>

        <div class="modal-input">
          <select id="category"></select>
        </div>

        <div class="modal-input">
          <select id="unitType">
            <option value="">Select Unit</option>
            <option value="pcs">Pieces</option>
            <option value="kg">Kilogram</option>
            <option value="g">Gram</option>
            <option value="ltr">Liter</option>
            <option value="ml">Milliliter</option>
            <option value="box">Box</option>
          </select>
        </div>

        <div class="modal-input">
          <input id="price" type="number" placeholder="Price">
        </div>

        <div class="modal-input">
          <input id="stock" type="number" placeholder="Stock">
        </div>

        <div class="modal-input full">
          <textarea id="description" placeholder="Description"></textarea>
        </div>

        <div class="modal-input">
          <input id="barcode" placeholder="Barcode">
        </div>

        <div class="modal-input file">
          <input type="file" id="image" accept="image/*">
        </div>

        <div class="checkbox-wrap full">
          <label>
            <input type="checkbox" id="isActive" checked>
            <span>Active Product</span>
          </label>
        </div>

        <!-- OFFER SECTION -->
        <div class="offer-box full">

          <label class="offer-check">
            <input type="checkbox" id="hasOffer">
            Product Has Special Offer
          </label>

          <select id="offerType">
            <option value="">Offer Type</option>
            <option value="PERCENT">Percentage %</option>
            <option value="AMOUNT">Flat Amount</option>
          </select>

          <input type="number" id="offerValue" placeholder="Offer Value">

          <!-- 🔥 NEW FIELDS -->
          <input type="date" id="offerStart" placeholder="Offer Start Date">
          <input type="date" id="offerEnd" placeholder="Offer End Date">

        </div>

      </div>

    </div>

    <!-- FOOTER (FIXED) -->
    <div class="modal-actions">
      <button class="btn-send" onclick="saveProduct()">💾 Save</button>
      <button class="btn-close" onclick="closeModal()">Cancel</button>
    </div>

  </div>
</div>

<!-- CATEGORY MODAL -->
<div id="categoryModal" class="modal">
  <div class="modal-content category-modal">

    <!-- HEADER -->
    <div class="modal-header">
      <div>
        <h2>📂 Categories</h2>
        <small>Manage product categories</small>
      </div>
      <button onclick="closeCategoryModal()">✖</button>
    </div>

    <!-- SEARCH -->
    <div class="category-search">
      <i class="fa fa-search"></i>
      <input id="categorySearch" placeholder="Search categories..." onkeyup="filterCategories()">
    </div>

    <!-- LIST -->
    <div id="categoryGrid" class="category-list"></div>

    <!-- ADD NEW -->
    <div class="category-footer">
      <input id="newCategory" placeholder="New category name">
      <button class="btn primary" onclick="addCategory()">
        <i class="fa fa-plus"></i> Add
      </button>
    </div>

  </div>
</div>

<div id="toast"></div>

    App.init();

</script>
