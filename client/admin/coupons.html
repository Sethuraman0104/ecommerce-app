<!DOCTYPE html>
<html>

<head>
    <title>Coupons</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../assets/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="brand-card">
            <div class="brand-glow"></div>
            <div class="brand-content">
                <div class="brand-logo">
                    <img id="companyLogo" src="../assets/logo.png">
                </div>
                <div class="brand-info">
                    <h2 id="companyName">E-Shop</h2>
                    <small>Admin Control Center</small>
                </div>
            </div>
        </div>

        <a href="/admin/dashboard.html"><i class="fa fa-home"></i> Dashboard</a>
        <a href="/admin/products.html"><i class="fa fa-box"></i> Products</a>
        <a href="/admin/orders.html"><i class="fa fa-file-invoice"></i> Orders</a>
        <a href="/admin/customers.html"><i class="fa fa-users"></i> Customers</a>
        <a href="/admin/payments.html"><i class="fa fa-credit-card"></i> Payments</a>
        <a href="/admin/coupons.html" class="active"><i class="fa fa-tag"></i> Coupons</a>
        <a href="/admin/reports.html"><i class="fa fa-chart-bar"></i> Reports</a>
        <a href="/admin/settings.html"><i class="fa fa-cog"></i> Settings</a>
        <a href="/admin/company.html"><i class="fa fa-building"></i> Company</a>

        <button onclick="App.logout()" class="logout-btn">
            <i class="fa fa-sign-out-alt"></i> Logout
        </button>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- TOPBAR -->
        <div class="topbar">
            <div class="page-title">
                <i class="fa fa-tag"></i>
                <h1>Coupons</h1>
            </div>

            <div class="top-right">
                <div class="user-card" onclick="App.goToProfile()">
                    <img id="userPhoto" src="../assets/user.png" class="user-avatar">
                    <div class="user-info">
                        <div class="user-name" id="userName">Admin</div>
                        <div class="user-role" id="userRole">Admin</div>
                        <div class="user-login" id="lastLogin">Last login: -</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- CONTENT -->
        <div class="company-wrapper">

            <!-- CREATE / EDIT -->
            <div class="company-card">
                <h2 class="section-title">
                    <i class="fa fa-plus"></i> Create Coupon
                </h2>

                <div class="form-grid">
                    <input id="cCode" placeholder="Coupon Code (SAVE10)">
                    <input id="cDiscount" type="number" placeholder="Discount %">
                    <input id="cExpiry" type="date">
                </div>

                <button class="btn primary" onclick="Coupons.save(event)">
                    <i class="fa fa-save"></i> Save Coupon
                </button>
            </div>

            <!-- LIST -->
            <div class="company-card">
                <h2 class="section-title">
                    <i class="fa fa-list"></i> Coupon List
                </h2>

                <!-- FILTERS -->
<div class="ord-filters">

    <div class="ord-search">
        <i class="fa fa-search"></i>
        <input id="couponSearch" placeholder="Search coupon code..." />
    </div>

    <select id="couponStatusFilter" class="ord-select">
        <option value="">All Status</option>
        <option value="1">Active</option>
        <option value="0">Inactive</option>
    </select>

</div>

                <div class="table-wrap">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Code</th>
                                <th>Discount</th>
                                <th>Expiry</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="couponTable"></tbody>
                    </table>
                </div>

            </div>

        </div>

        <div class="footer" id="appFooter"></div>

    </div>
</div>


<div id="couponUsageModal" class="ord-modal">

    <div class="ord-modal-box" style="width:800px;">

        <div class="ord-modal-header">
            <h2>Coupon Usage</h2>

            <button class="ord-close-btn" onclick="Coupons.closeUsageModal()">
                <i class="fa fa-times"></i>
            </button>
        </div>

        <div class="ord-modal-body" style="display:block;">
            <div id="couponUsageList"></div>
        </div>

    </div>

</div>

<script src="../assets/js/common.js"></script>
<script src="../assets/js/coupons.js"></script>

<script>
    App.init();
    Coupons.init();
</script>

</body>
</html>
