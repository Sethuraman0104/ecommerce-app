<!DOCTYPE html>
<html>

<head>
    <title id="pageTitle">Company Settings</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../assets/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">

    <!-- TOP (BRAND) -->
    <div class="sidebar-top">

        <div class="brand-card">
            <div class="brand-glow"></div>

            <div class="brand-content">
                <div class="brand-logo">
                    <img id="companyLogo" src="../assets/logo.png">
                </div>

                <div class="brand-info">
                    <h2 id="companyName">E-Shop</h2>
                    <small>Admin Control Center</small>
                </div>
            </div>
        </div>

    </div>

    <!-- MIDDLE (MENU) -->
    <div class="sidebar-menu">

        <a href="/admin/dashboard.html"><i class="fa fa-home"></i> Dashboard</a>
        <a href="/admin/products.html"><i class="fa fa-box"></i> Products</a>
        <a href="/admin/orders.html"><i class="fa fa-file-invoice"></i> Orders</a>
        <a href="/admin/customers.html"><i class="fa fa-users"></i> Customers</a>
        <a href="/admin/payments.html"><i class="fa fa-credit-card"></i> Payments</a>
        <a href="/admin/coupons.html"><i class="fa fa-tag"></i> Coupons</a>
        <a href="/admin/reports.html"><i class="fa fa-chart-bar"></i> Reports</a>
        <a href="/admin/settings.html"><i class="fa fa-cog"></i> Settings</a>
        <a href="/admin/company.html" class="active"><i class="fa fa-building"></i> Company</a>

    </div>

    <!-- BOTTOM (FIXED AREA) -->
    <div class="sidebar-bottom">

        <!-- LOGOUT -->
        <div class="esh-logout" onclick="App.logout()">
            <div class="esh-logout-icon">
                <i class="fa fa-right-from-bracket"></i>
            </div>

            <div class="esh-logout-text">
                <div class="title">Logout</div>
                <div class="sub">Sign out from system</div>
            </div>

            <div class="esh-logout-arrow">
                <i class="fa fa-chevron-right"></i>
            </div>
        </div>

        <!-- VERSION -->
        <div class="esh-sidebar-footer">

            <div class="esh-divider"></div>

            <div class="esh-app-info">
                <div class="esh-app-name" id="eshappname">E-Shop Admin</div>
                <div class="esh-app-version">Version 1.0.0</div>
            </div>

        </div>

    </div>

</div>
    <div class="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- MAIN -->
    <div class="main">

        <!-- TOPBAR -->
        <div class="topbar">
<button class="mobile-menu-btn" onclick="toggleSidebar()">
    <i class="fa fa-bars"></i>
</button>  
            <div class="page-title">
                <i class="fa fa-building"></i>
                <h1>Company Settings</h1>
            </div>

            <div class="top-right">
                <div class="user-card" onclick="App.goToProfile()">

                    <img id="userPhoto" src="../assets/user.png" class="user-avatar">

                    <div class="user-info">

    <div class="user-name" id="userName">Admin</div>

    <div class="user-role" id="userRole">Admin</div>

    <div class="user-login" id="lastLogin">Last login: -</div>

</div>

                </div>
            </div>

        </div>

        <!-- CONTENT -->
        <div class="company-wrapper">

            <div class="company-card">

                <h2 class="section-title">
                    <i class="fa fa-building"></i> Company Information
                </h2>

                <div class="form-grid">

                    <input id="cName" placeholder="Company Name">
                    <input id="cEmail" placeholder="Email">
                    <input id="cPhone" placeholder="Phone">
                    <input id="cWebsite" placeholder="Website">
                    <textarea id="cAddress" placeholder="Address"></textarea>

                </div>

                <button class="btn primary" onclick="Company.save(event)">
                    <i class="fa fa-save"></i> Save Company
                </button>

            </div>

            <div class="logo-card">
                <h3>Company Logo</h3>

                <img id="logoPreview" class="logo-preview" src="../assets/logo.png">

                <input type="file" id="cLogo" onchange="Company.preview(event)">
            </div>

        </div>

        <!-- FOOTER -->
        <div class="footer" id="appFooter"></div>

    </div>

</div>

<script src="../config/config.js"></script>

<!-- COMMON -->
<script src="../assets/js/common.js"></script>

<!-- COMPANY PAGE -->
<script src="../assets/js/company.js"></script>

<script>
    App.init();
    Company.init();
</script>

<script>

function toggleSidebar() {

    document.querySelector(".sidebar")
        .classList.toggle("active");

    document.querySelector(".sidebar-overlay")
        .classList.toggle("active");
}

function closeSidebar() {

    document.querySelector(".sidebar")
        .classList.remove("active");

    document.querySelector(".sidebar-overlay")
        .classList.remove("active");
}

/* AUTO CLOSE MOBILE MENU */
document.querySelectorAll(".sidebar a")
    .forEach(link => {

        link.addEventListener("click", () => {

            if (window.innerWidth <= 768) {
                closeSidebar();
            }
        });
    });

/* AUTO RESET DESKTOP */
window.addEventListener("resize", () => {

    if (window.innerWidth > 768) {
        closeSidebar();
    }
});

</script>
</body>
</html>
