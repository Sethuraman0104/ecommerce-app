<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title id="pageTitle">Loading...</title>
<link id="appFavicon" rel="icon" href="assets/logo.png">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="assets/css/home.css">
<link rel="stylesheet" href="assets/css/checkout.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<header class="topbar">
    <div class="brand">
        <img id="logo" src="assets/logo.png">
        <span id="companyName">E-Shop</span>
    </div>

    <div class="page-title-header">
        <i class="fa fa-credit-card"></i> Checkout
    </div>

    <div class="actions">
        <div id="userBox" class="user-box"></div>

        <button class="icon-btn" onclick="goHome()">
            <i class="fa fa-arrow-left"></i>
        </button>
    </div>
</header>

<div class="checkout-container">

    <!-- CUSTOMER -->
    <div class="checkout-box">
        <h3>Customer Details</h3>

        <div class="form-grid">
            <input id="cName" placeholder="Full Name">
            <input id="cEmail" placeholder="Email">
            <input id="cPhone" placeholder="Phone">
            <input id="cCity" placeholder="City">
            <input id="cState" placeholder="State">
            <input id="cCountry" placeholder="Country">
            <input id="cPostal" placeholder="Postal Code">
        </div>

        <input id="cAddress1" placeholder="Address Line 1">
        <input id="cAddress2" placeholder="Address Line 2">
    </div>

    <!-- ORDER -->
    <div class="checkout-box">
        <h3>Order Summary</h3>
        <div id="orderSummary"></div>
    </div>

    <button class="btn-primary checkout-btn" onclick="Checkout.placeOrder()">
        <i class="fa fa-lock"></i> Place Order
    </button>

</div>

<script src="assets/js/customer-common.js"></script>
<script src="assets/js/checkout.js"></script>

<script>
CustomerApp.init();
</script>

</body>
</html>
