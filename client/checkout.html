<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout</title>

<link rel="stylesheet" href="assets/css/home.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="checkout-container">

    <h2 class="page-title">Checkout</h2>

    <!-- USER INFO HEADER AUTO INSERTED -->

    <!-- CUSTOMER -->
    <div class="checkout-box">
        <h3>Customer Details</h3>

        <input id="cName" placeholder="Full Name">
        <input id="cEmail" placeholder="Email">
        <input id="cPhone" placeholder="Phone">

        <input id="cAddress1" placeholder="Address Line 1">
        <input id="cAddress2" placeholder="Address Line 2">

        <div class="row">
            <input id="cCity" placeholder="City">
            <input id="cState" placeholder="State">
        </div>

        <div class="row">
            <input id="cCountry" placeholder="Country">
            <input id="cPostal" placeholder="Postal Code">
        </div>
    </div>

    <!-- ORDER -->
    <div class="checkout-box">

        <h3>Order Summary</h3>

        <div id="orderSummary"></div>

    </div>

    <button class="btn-primary checkout-btn" onclick="Checkout.placeOrder()">
        <i class="fa fa-lock"></i> Place Order
    </button>

</div>

<script src="assets/js/customer-common.js"></script>
<script>
    CustomerApp.init();   <!-- MUST RUN FIRST -->
</script>

<script src="assets/js/checkout.js"></script>

</body>
</html>
