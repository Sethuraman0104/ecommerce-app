<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title id="pageTitle">Loading...</title>

<link id="appFavicon" rel="icon" href="assets/logo.png">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="assets/css/home.css">
</head>

<body>

<!-- HEADER -->
<header class="topbar">
    <div class="brand">
         <!-- ✅ ONLY LOGO HERE -->
        <img id="logo" src="assets/logo.png">
        <span id="companyName">E-Shop</span>
    </div>

    <div class="search">
        <i class="fa fa-search"></i>
        <input id="search" placeholder="Search products...">
    </div>

    <div class="actions">
        <button class="icon-btn" onclick="UI.openCart()">
            <i class="fa fa-cart-shopping"></i>
            <span class="badge">0</span>
        </button>
    </div>
</header>

<!-- HERO BANNER -->
<div class="hero-banner">
    <img src="assets/banners/banner.png" class="hero-banner-img">

    <!-- <div class="hero-banner-content">
        <h1>Big Summer Deals</h1>
        <p>Up to 70% OFF on selected products</p>

        <button onclick="window.scrollTo({top:700,behavior:'smooth'})">
            Shop Now
        </button>
    </div> -->
</div>

<!-- CATEGORY BAR -->
<div id="categories" class="category-bar"></div>

<!-- HERO BANNERS -->
<div class="hero-slider">

    <div class="hero-card hero-1">
        <div class="hero-overlay"></div>

        <div class="hero-content">
            <h2>Big Summer Sale</h2>
            <p>Up to 50% OFF on selected products</p>
            <button onclick="window.scrollTo({top:700,behavior:'smooth'})">
                Shop Now
            </button>
        </div>

        <img src="assets/img/bucket.png">
    </div>

    <div class="hero-card hero-2">
        <div class="hero-overlay"></div>

        <div class="hero-content">
            <h2>Fresh Grocery Deals</h2>
            <p>Daily essentials at the best prices</p>
            <button onclick="window.scrollTo({top:700,behavior:'smooth'})">
                Explore
            </button>
        </div>

        <img src="assets/img/bucketitems.png">
    </div>

</div>

<!-- OFFER PRODUCTS -->
<div id="offerProducts" class="offer-section"></div>

<!-- PRODUCTS -->
<div id="products" class="container"></div>

<!-- CART -->
<div id="cartModal" class="modal">
    <div class="cart-modal">

        <!-- HEADER -->
        <div class="cart-header">
            <h2><i class="fa fa-cart-shopping"></i> My Cart</h2>
            <button class="modal-close" onclick="UI.closeCart()">✕</button>
        </div>

        <!-- ITEMS -->
        <div id="cartItems" class="cart-items"></div>

        <!-- FOOTER -->
        <div class="cart-footer">
            <div id="cartTotal">0</div>
            <button class="checkout" onclick="CustomerApp.goToCheckout()">
    Checkout
</button>
        </div>

    </div>
</div>

<!-- QUICK VIEW -->
<div id="quickView" class="modal">
    <div class="modal-card">

        <!-- HEADER -->
        <div class="modal-header">
            <h3>Product Details</h3>
            <button class="modal-close" onclick="Shop.closeQuick()">✕</button>
        </div>

        <!-- IMAGE -->
        <div class="modal-image">
            <img id="qImg">
        </div>

        <!-- BODY -->
        <div class="modal-body">
            <h3 id="qName"></h3>
            <div id="unitLabel"></div>

            <!-- QTY -->
            <div class="qty-box">
                <button onclick="Shop.qty(-1)">−</button>
                <input id="qty" type="number" value="1" min="1" readonly>
                <button onclick="Shop.qty(1)">+</button>
            </div>

            <!-- PRICE -->
            <div id="qPrice" class="modal-price"></div>
        </div>

        <!-- FOOTER -->
        <div class="modal-footer">
            <button class="btn-primary" onclick="Shop.add()">Add to Cart</button>
        </div>

    </div>
</div>

<!-- LOGIN MODAL -->
<div id="authModal" class="modal">
    <div class="modal-card">

        <div class="modal-header">
            <h3>Login / Register</h3>
            <button class="modal-close" onclick="Auth.close()">✕</button>
        </div>

        <div class="modal-body">

            <input id="email" placeholder="Email">
            <input id="password" type="password" placeholder="Password">
            <input id="name" placeholder="Full Name (for register)">

            <button class="btn-primary" onclick="Auth.login()">Login</button>
            <button class="btn-secondary" onclick="Auth.register()">Register</button>

            <hr>

            <a href="http://localhost:5000/api/customer-auth/google"
               class="btn-primary"
               style="display:block;text-align:center;">
               Continue with Google
            </a>

        </div>
    </div>
</div>

<script src="assets/js/customer-common.js"></script>
<script src="assets/js/home.js"></script>

<script>
CustomerApp.init();
</script>

</body>
</html>
