<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title id="pageTitle">Loading...</title>

<link id="appFavicon" rel="icon" href="assets/logo.png">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="assets/css/home.css">
</head>

<body>
<!-- HEADER -->
<header class="topbar">
    <div class="brand">
         <!-- ✅ ONLY LOGO HERE -->
        <img id="logo" src="assets/logo.png">
        <span id="companyName">E-Shop</span>
    </div>

    <div class="search">
        <i class="fa fa-search"></i>
        <input id="search" placeholder="Search products...">
    </div>
<!-- =========================================
     ALL CATEGORIES MENU
========================================= -->

<div class="top-categories">

    <!-- MAIN BUTTON -->
    <button class="all-cat-btn"
            onclick="toggleCategoryMenu()">

        <i class="fa fa-bars"></i>

        <span>All Categories</span>

        <i class="fa fa-chevron-down small-arrow"></i>

    </button>

    <!-- DROPDOWN -->
    <div class="all-cat-dropdown"
         id="topCategoryLinks">

        <!-- ALL -->
        <div class="all-cat-item active"
             onclick="filterCat(null, this)">

            <div class="cat-icon">
                <i class="fa fa-layer-group"></i>
            </div>

            <span>All Products</span>

        </div>

        <!-- DYNAMIC -->
        <div id="dynamicTopCategories"></div>

    </div>

</div>

<div class="actions">

   <!-- CUSTOMER MENU -->
<div class="customer-menu">

    <!-- MAIN BUTTON -->
    <button id="authBtn"
            class="customer-btn"
            onclick="Auth.toggleMenu(event)">

        <div class="customer-avatar">
            <i class="fa fa-user"></i>
        </div>

        <div class="customer-info">

            <span class="customer-label">
                Account
            </span>

            <span id="authBtnText"
                  class="customer-name">

                Sign In

            </span>

        </div>

        <i class="fa fa-chevron-down customer-arrow"></i>

    </button>

    <!-- DROPDOWN -->
    <div id="customerDropdown"
         class="customer-dropdown">

       <div id="guestMenu" class="guest-menu">

    <button class="dropdown-btn signin-item"
            onclick="Auth.open()">

        <div class="menu-icon login-icon">
            <i class="fa fa-user-lock"></i>
        </div>

        <div class="menu-text">
            <span>Sign In</span>
            <small>Access your account</small>
        </div>

        <i class="fa fa-chevron-right menu-arrow"></i>

    </button>

    <button class="dropdown-btn register-item"
            onclick="Auth.openRegister()">

        <div class="menu-icon register-icon">
            <i class="fa fa-user-plus"></i>
        </div>

        <div class="menu-text">
            <span>Create Account</span>
            <small>Register new profile</small>
        </div>

        <i class="fa fa-chevron-right menu-arrow"></i>

    </button>

</div>

        <div id="loggedMenu"
     class="logged-menu"
     style="display:none;">

    <!-- MY ORDERS -->
    <button class="dropdown-btn signin-item"
            onclick="location.href='my-orders.html'">

        <div class="menu-icon orders-icon">
            <i class="fa fa-bag-shopping"></i>
        </div>

        <div class="menu-text">
            <span>My Orders</span>
            <small>Track your purchases</small>
        </div>

        <i class="fa fa-chevron-right menu-arrow"></i>

    </button>

    <!-- LOGOUT -->
    <button class="dropdown-btn register-item"
            onclick="Auth.logout()">

        <div class="menu-icon logout-icon">
            <i class="fa fa-right-from-bracket"></i>
        </div>

        <div class="menu-text">
            <span>Logout</span>
            <small>Securely sign out</small>
        </div>

        <i class="fa fa-chevron-right menu-arrow"></i>

    </button>

</div>

    </div>

</div>
    <!-- CART -->
    <button class="icon-btn"
            onclick="UI.openCart()">

        <i class="fa fa-cart-shopping"></i>

        <span class="badge">0</span>

    </button>

</div>
</header>

<!-- HERO BANNER -->
<div class="hero-banner">
    <img src="assets/banners/banner.png" class="hero-banner-img">

    <!-- <div class="hero-banner-content">
        <h1>Big Summer Deals</h1>
        <p>Up to 70% OFF on selected products</p>

        <button onclick="window.scrollTo({top:700,behavior:'smooth'})">
            Shop Now
        </button>
    </div> -->
</div>

<!-- HERO BANNERS -->
<div class="hero-slider">

    <div class="hero-card hero-1">
        <div class="hero-overlay"></div>

        <div class="hero-content">
            <h2>Big Summer Sale</h2>
            <p>Up to 50% OFF on selected products</p>
            <button onclick="window.scrollTo({top:700,behavior:'smooth'})">
                Shop Now
            </button>
        </div>

        <img src="assets/img/bucket.png">
    </div>

    <div class="hero-card hero-2">
        <div class="hero-overlay"></div>

        <div class="hero-content">
            <h2>Fresh Grocery Deals</h2>
            <p>Daily essentials at the best prices</p>
            <button onclick="window.scrollTo({top:700,behavior:'smooth'})">
                Explore
            </button>
        </div>

        <img src="assets/img/bucketitems.png">
    </div>

</div>

<!-- CATEGORY BAR -->
<div id="categories" class="category-bar"></div>

<!-- OFFER PRODUCTS -->
<div id="offerProducts" class="offer-section"></div>

<!-- PRODUCTS -->
<div id="products" class="container"></div>

<!-- CART -->
<div id="cartModal" class="modal">
    <div class="cart-modal">

        <!-- HEADER -->
        <div class="cart-header">
            <h2><i class="fa fa-cart-shopping"></i> My Cart</h2>
            <button class="modal-close" onclick="UI.closeCart()">✕</button>
        </div>

        <!-- ITEMS -->
        <div id="cartItems" class="cart-items"></div>

        <!-- FOOTER -->
        <div class="cart-footer">
            <div id="cartTotal">0</div>
            <button class="checkout" onclick="CustomerApp.goToCheckout()">
                <i class="fa fa-credit-card"></i>
    Checkout
</button>
        </div>

    </div>
</div>

<!-- QUICK VIEW -->
<div id="quickView" class="modal">
    <div class="modal-card">

        <!-- HEADER -->
        <div class="modal-header">
            <h3>Product Details</h3>
            <button class="modal-close" onclick="Shop.closeQuick()">✕</button>
        </div>

        <!-- IMAGE -->
        <div class="modal-image">
            <img id="qImg">
        </div>

        <!-- BODY -->
        <div class="modal-body">
            <h3 id="qName"></h3>
            <div id="unitLabel"></div>

            <!-- QTY -->
            <div class="qty-box">
                <button onclick="Shop.qty(-1)">−</button>
                <input id="qty" type="number" value="1" min="1" readonly>
                <button onclick="Shop.qty(1)">+</button>
            </div>

            <!-- PRICE -->
            <div id="qPrice" class="modal-price"></div>
        </div>

        <!-- FOOTER -->
        <div class="modal-footer">
            <button class="btn-primary" onclick="Shop.add()"><i class="fa fa-cart-plus"></i> Add to Cart</button>
        </div>

    </div>
</div>

<!-- AUTH MODAL -->
<div id="authModal" class="modal">

    <div class="modal-card auth-card">

        <!-- HEADER -->
        <div class="modal-header">

            <h3 id="authTitle">
                Customer Login
            </h3>

            <button class="modal-close"
                    onclick="Auth.close()">
                ✕
            </button>

        </div>

        <!-- BODY -->
        <div class="modal-body auth-body">

            <input id="authName"
                   placeholder="Full Name"
                   style="display:none;">

            <input id="authEmail"
                   type="email"
                   placeholder="Email Address">

            <input id="authPassword"
                   type="password"
                   placeholder="Password">

            <!-- LOGIN -->
            <button id="loginBtn"
                    class="btn-primary"
                    onclick="Auth.login()">

                <i class="fa fa-right-to-bracket"></i>

                Login & Continue

            </button>

            <!-- REGISTER -->
            <button id="registerBtn"
                    class="btn-secondary"
                    onclick="Auth.register()"
                    style="display:none;">

                <i class="fa fa-user-plus"></i>

                Create Account

            </button>

            <!-- FORGOT -->
            <button class="link-btn"
                    onclick="Auth.forgotPassword()">

                Forgot Password?

            </button>

            <!-- TOGGLE -->
            <div class="auth-switch">

                <span id="authSwitchText">
                    New customer?
                </span>

                <a href="javascript:void(0)"
                   onclick="Auth.toggleMode()"
                   id="authSwitchBtn">

                    Create Account

                </a>

            </div>

            <div class="auth-divider">
                OR
            </div>

            <!-- GOOGLE -->
            <a href="http://localhost:5000/api/customer-auth/google"
               class="google-btn">

                <i class="fa-brands fa-google"></i>

                Continue with Google

            </a>

        </div>

    </div>

</div>
<div id="toast"></div>
<!-- FLOATING ACTION BUTTONS -->
<div id="floatingActions" class="floating-actions">

    <!-- VIEW CART -->
    <button class="floating-action cart-action"
            onclick="UI.openCart()">

        <i class="fa fa-cart-shopping"></i>

        <span id="floatingCartCount">0</span>

    </button>

    <!-- CHECKOUT -->
    <button class="floating-action checkout-action"
            onclick="CustomerApp.goToCheckout()">

        <i class="fa fa-credit-card"></i>

    </button>

</div>

<script src="assets/js/customer-common.js"></script>
<script src="assets/js/home.js"></script>

<script>
CustomerApp.init();
</script>

</body>
</html>
